<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026端午拆粽大作戰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --bg:#d8f0b0;
    --bg2:#9bd56f;
    --panel:#fff7c7;
    --panel2:#ffe9a8;
    --green:#2fa84f;
    --green-dark:#17662f;
    --brown:#7a4a1d;
    --brown-dark:#3f250e;
    --orange:#d85b18;
    --red:#e64b3c;
    --gold:#ffd34f;
    --silver:#dfe6e9;
    --bronze:#c98242;
    --ink:#24170c;
    --black:#1b1209;
    --white:#fffef0;
}
*{box-sizing:border-box;}
html{image-rendering:pixelated;}
body{
    margin:0;
    min-height:100vh;
    font-family:"Press Start 2P","Microsoft JhengHei",monospace;
    color:var(--ink);
    background-color:var(--bg);
    background-image:
        linear-gradient(45deg, rgba(255,255,255,.16) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.16) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(47,168,79,.16) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(47,168,79,.16) 75%),
        linear-gradient(180deg,#f9f0a4 0%,#c7e982 48%,#84c763 100%);
    background-size:32px 32px,32px 32px,32px 32px,32px 32px,100% 100%;
    background-position:0 0,0 16px,16px -16px,-16px 0,0 0;
    overflow-x:hidden;
}
body:before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        repeating-linear-gradient(0deg, rgba(0,0,0,.04) 0 2px, transparent 2px 4px),
        radial-gradient(circle at 18% 14%, rgba(255,255,255,.38) 0 38px, transparent 39px),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.26) 0 50px, transparent 51px);
    opacity:.75;
    z-index:0;
}
.layout{
    position:relative;
    z-index:1;
    max-width:1180px;
    margin:28px auto;
    display:grid;
    grid-template-columns:340px 1fr;
    gap:26px;
    padding:0 16px;
}
.container,.side{
    background:var(--panel);
    border:5px solid var(--black);
    border-radius:0;
    box-shadow:8px 8px 0 var(--brown-dark);
}
.container{
    text-align:center;
    padding:30px;
    overflow:hidden;
    position:relative;
}
.container:before{
    content:"ZONGZI QUEST";
    position:absolute;
    right:14px;
    top:12px;
    font-size:10px;
    color:rgba(36,23,12,.22);
    letter-spacing:1px;
}
.side{
    padding:20px;
    align-self:start;
}
.zongzi{
    position:relative;
    width:fit-content;
    margin:8px auto 0;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:visible;
}
.zongzi img{
    width:260px;
    max-width:82%;
    image-rendering:pixelated;
    filter:drop-shadow(8px 8px 0 rgba(27,18,9,.28));
    animation:pixelFloat 1.15s steps(2,end) infinite;
}
@keyframes pixelFloat{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(0,-8px);}
}
h1,.main-title{
    margin:16px 0 24px;
    font-size:30px;
    line-height:1.55;
    color:#8f3f10;
    font-weight:400;
    text-shadow:3px 3px 0 #fff1a8, 5px 5px 0 rgba(27,18,9,.15);
}

.activity-dates{
    margin:-12px auto 18px;
    display:inline-block;
    padding:10px 14px;
    background:#fff1a8;
    border:3px solid var(--black);
    box-shadow:3px 3px 0 rgba(63,37,14,.75);
    color:#8f3f10;
    font-size:11px;
    line-height:2;
}
.activity-dates span{
    color:#24170c;
}

h2{
    margin:0 0 14px;
    color:var(--brown-dark);
    font-size:18px;
    font-weight:400;
}
p{
    margin:10px 0;
    line-height:1.7;
    font-size:13px;
}
.card{
    background:var(--panel2);
    border:4px solid var(--black);
    border-radius:0;
    padding:20px;
    margin-top:18px;
    box-shadow:5px 5px 0 rgba(63,37,14,.85);
}
#gameCard{
    background:#fef3bd;
    border-color:var(--black);
    position:relative;
}
#gameCard:before,
#gameCard:after{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    background:var(--black);
    top:8px;
}
#gameCard:before{left:8px;}
#gameCard:after{right:8px;}
.button{
    margin-top:22px;
    border:4px solid var(--black);
    background:#34c764;
    color:white;
    padding:16px 34px;
    font-size:16px;
    font-weight:400;
    border-radius:0;
    cursor:pointer;
    box-shadow:6px 6px 0 var(--green-dark);
    transition:transform .08s steps(1,end), box-shadow .08s steps(1,end), background .08s steps(1,end);
    font-family:"Press Start 2P","Microsoft JhengHei",monospace;
    text-shadow:2px 2px 0 var(--green-dark);
}
.button:hover:not(:disabled){
    transform:translate(-2px,-2px);
    background:#43df72;
    box-shadow:8px 8px 0 var(--green-dark);
}
.button:active:not(:disabled){
    transform:translate(4px,4px);
    box-shadow:2px 2px 0 var(--green-dark);
}
.button:disabled{
    background:#9aa5a1;
    color:#edf0df;
    cursor:not-allowed;
    box-shadow:6px 6px 0 #5f6663;
    text-shadow:2px 2px 0 #5f6663;
}
.logout{
    background:#6b7478;
    box-shadow:6px 6px 0 #3d4548;
    text-shadow:2px 2px 0 #3d4548;
}
.avatar{
    width:84px;
    height:84px;
    border-radius:0;
    margin-top:10px;
    border:4px solid var(--black);
    box-shadow:5px 5px 0 var(--brown-dark);
    image-rendering:pixelated;
}
.debug{display:none;}
.leaves{
    display:inline-block;
    min-width:180px;
    font-size:54px;
    line-height:1.35;
    font-weight:400;
    color:#0d7b35;
    margin:6px 0 14px;
    text-shadow:4px 4px 0 #b7f094, 6px 6px 0 rgba(27,18,9,.18);
}
.leaves:before{
    content:"LEAVES";
    display:block;
    font-size:12px;
    color:var(--brown-dark);
    text-shadow:none;
    margin-bottom:8px;
    letter-spacing:1px;
}
.leaves:after{
    content:"";
}

.leaf-burst-layer{
    position:absolute;
    left:50%;
    top:46%;
    width:1px;
    height:1px;
    pointer-events:none;
    z-index:20;
    overflow:visible;
}
.leaf-piece{
    position:absolute;
    left:0;
    top:0;
    width:20px;
    height:14px;
    background:#35c95d;
    border:3px solid var(--black);
    box-shadow:3px 3px 0 rgba(27,18,9,.35), inset -4px 0 0 #1e8f3f;
    transform:translate(-50%,-50%);
    animation:leafFly .9s steps(6,end) forwards;
}
.leaf-piece:before{
    content:"";
    position:absolute;
    left:3px;
    top:3px;
    width:6px;
    height:3px;
    background:#b7f094;
}
.leaf-piece:after{
    content:"";
    position:absolute;
    right:-6px;
    top:3px;
    width:6px;
    height:4px;
    background:#7a4a1d;
    border:2px solid var(--black);
}
@keyframes leafFly{
    0%{
        opacity:1;
        transform:translate(-50%,-50%) rotate(0deg) scale(1);
    }
    55%{
        opacity:1;
        transform:translate(calc(var(--dx) * .65), calc(var(--dy) * .65)) rotate(calc(var(--rot) * .65)) scale(1.12);
    }
    100%{
        opacity:0;
        transform:translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(.75);
    }
}
.zongzi.hit img{
    animation:pixelHit .28s steps(2,end), pixelFloat 1.15s steps(2,end) infinite .28s;
}
@keyframes pixelHit{
    0%{transform:translate(0,0) scale(1);}
    35%{transform:translate(-8px,0) scale(1.04);}
    70%{transform:translate(8px,-4px) scale(.98);}
    100%{transform:translate(0,0) scale(1);}
}

.bonus-message{
    display:none;
    margin-top:16px;
    padding:14px;
    background:#ffd34f;
    border:4px solid var(--black);
    color:#c74712;
    font-size:13px;
    line-height:1.8;
    box-shadow:4px 4px 0 #b77e16;
    text-shadow:1px 1px 0 #fff7c7;
    animation:pixelFlash .8s steps(2,end) infinite;
}
@keyframes pixelFlash{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.04);}
}

.dice-result{
    margin-top:24px;
    font-size:15px;
    line-height:2;
    font-weight:400;
    color:var(--orange);
    background:#fff1a8;
    border:4px solid var(--black);
    box-shadow:4px 4px 0 var(--brown-dark);
    padding:14px;
    min-height:0;
}
.dice-result:empty{
    display:none;
}
.cooldown{
    display:inline-block;
    margin-top:20px;
    padding:12px 14px;
    font-size:12px;
    line-height:1.7;
    color:var(--brown-dark);
    font-weight:400;
    background:#dff6bd;
    border:4px solid var(--black);
    border-radius:0;
    box-shadow:4px 4px 0 #7aac52;
}
.status{
    display:inline-block;
    font-size:12px;
    line-height:1.7;
    font-weight:400;
    color:#8f3f10;
    margin:8px 0 14px;
    padding:10px 12px;
    background:#fff1a8;
    border:3px solid var(--black);
    border-radius:0;
    box-shadow:3px 3px 0 rgba(63,37,14,.75);
}
.winner-title,.rank-title{
    font-size:16px;
    line-height:1.55;
    font-weight:400;
    color:var(--brown-dark);
    margin-bottom:14px;
    text-shadow:2px 2px 0 #fff1a8;
}
.rank-title{
    margin-top:28px;
    padding-top:24px;
    border-top:4px dotted var(--brown-dark);
}
.winner-item{
    background:#fff1a8;
    border:4px solid var(--black);
    border-radius:0;
    padding:14px;
    margin-bottom:14px;
    box-shadow:5px 5px 0 rgba(63,37,14,.78);
}
.winner-date{
    font-weight:400;
    color:var(--brown-dark);
    line-height:1.8;
    font-size:11px;
}
.winner-name{
    color:var(--orange);
    font-size:14px;
    font-weight:400;
    line-height:1.7;
    margin-top:10px;
    word-break:break-word;
    text-shadow:1px 1px 0 #fff7c7;
}
.empty-winner{
    color:#65523d;
    margin-top:8px;
    padding:14px;
    background:#fff1a8;
    border:3px solid var(--black);
    border-radius:0;
    line-height:1.7;
    font-size:11px;
}
.rank-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fff1a8;
    border:4px solid var(--black);
    border-radius:0;
    padding:12px;
    margin-bottom:12px;
    box-shadow:4px 4px 0 rgba(63,37,14,.75);
    gap:10px;
}
.rank-item:nth-child(1){background:#ffd34f;box-shadow:4px 4px 0 #b77e16;}
.rank-item:nth-child(2){background:#e8edf0;box-shadow:4px 4px 0 #8c9aa1;}
.rank-item:nth-child(3){background:#d99a5b;box-shadow:4px 4px 0 #8b5525;}
.rank-item.me{
    outline:4px solid var(--red);
    outline-offset:2px;
}
.rank-left{
    display:flex;
    align-items:center;
    gap:9px;
    flex:1;
    min-width:0;
}
.rank-medal{font-size:18px;flex:0 0 auto;}
.rank-name{
    flex:1;
    min-width:0;
    font-weight:400;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    font-size:11px;
    line-height:1.7;
}
.rank-score{
    color:#c74712;
    font-weight:400;
    flex:0 0 auto;
    margin-left:6px;
    font-size:11px;
}
.rank-me{font-size:10px;color:#c74712;margin-left:4px;}
.rank-sub{
    font-size:10px;
    color:#65523d;
    margin-top:12px;
    line-height:1.8;
}
.end-title{
    font-size:22px;
    line-height:1.7;
    font-weight:400;
    color:var(--orange);
    margin-top:10px;
    text-shadow:2px 2px 0 #fff1a8;
}
.end-text{
    font-size:13px;
    color:var(--brown-dark);
    line-height:2;
}
@media(max-width:900px){
    .layout{grid-template-columns:1fr;margin:18px auto;padding:0 14px;gap:18px;}
    .side{order:2;}
    .container{order:1;padding:22px 16px;}
    .container:before{display:none;}
    .zongzi img{width:210px;}
    h1,.main-title{font-size:20px;line-height:1.7;}
    h2{font-size:15px;}
    .leaves{font-size:42px;}
    .button{width:100%;padding:15px 12px;font-size:14px;}
    .rank-name{font-size:10px;}
    .rank-score{font-size:10px;}
}
</style>
</head>

<body>
<div class="layout">
    <div class="side">
        <div class="winner-title">🏆 中獎者列表</div>
        <div id="winnerList">讀取中...</div>

        <div class="rank-title">📊 拆粽排行榜 TOP10</div>
        <div id="rankingList">讀取中...</div>
    </div>

    <div class="container">
        <div class="zongzi">
            <img src="zongzi.png" alt="粽子">
            <div id="leafBurstLayer" class="leaf-burst-layer"></div>
        </div>
        <h1 class="main-title">🎋 2026端午拆粽大作戰 🎋</h1>
        <div class="activity-dates" id="activityDates">活動時間讀取中...</div>

        <div class="card" id="userBox">載入中...</div>

        <div class="card" id="gameCard">
            <h2>今日粽子</h2>
            <div class="status" id="activityStatus"></div>

            <p>剩餘粽葉</p>
            <div class="leaves" id="remainingLeaves">讀取中...</div>

            <button class="button" id="openBtn" onclick="openZongzi()">拆粽子</button>

            <div class="cooldown" id="cooldownText"></div>
            <div class="bonus-message" id="bonusMessage"></div>
            <div class="dice-result" id="diceResult"></div>
        </div>

        <button class="button" id="loginBtn" onclick="loginWithDiscord()">使用 Discord 登入</button>
        <button class="button logout" id="logoutBtn" onclick="logout()" style="display:none;">登出</button>

        <div class="debug" id="debugBox">debug...</div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://ibupsejdhvagpozqorpl.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ybz32jxKJ0DiJ6oUJvsXHA_tcEr80QH";

const MIN_LEAVES = 100;
const MAX_LEAVES = 200;

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}
});

let currentGameState = null;
let currentUser = null;
let currentPlayer = null;
let cooldownTimer = null;
let todayWinner = null;
let activityState = "loading";
let cooldownSyncedAt = 0;
let rankingTimer = null;
let isOpeningZongzi = false;
let lastOpenClickAt = 0;
const OPEN_CLICK_GUARD_MS = 3000;

function debug(msg){
    document.getElementById("debugBox").textContent += "\n" + msg;
}

function getTodayString(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
}

function getRandomLeaves(){
    return Math.floor(Math.random() * (MAX_LEAVES - MIN_LEAVES + 1)) + MIN_LEAVES;
}

function formatTime(ms){
    const s=Math.max(0,Math.floor(ms/1000));
    return `${Math.floor(s/3600)}小時 ${Math.floor((s%3600)/60)}分 ${s%60}秒`;
}

function formatDate(dateText){
    const d = new Date(dateText + "T00:00:00");
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}

function updateActivityDates(game){
    const box = document.getElementById("activityDates");
    if(!box || !game) return;

    box.innerHTML = `
        活動開始時間：<span>${formatDate(game.activity_start_date)}</span><br>
        活動結束時間：<span>${formatDate(game.activity_end_date)}</span>
    `;
}

function getDiscordInfo(user){
    const meta=user.user_metadata||{};
    return {
        name: meta.full_name || meta.name || meta.preferred_username || "Discord 玩家",
        avatar: meta.avatar_url || meta.picture || "",
        discordId: meta.provider_id || meta.sub || user.id
    };
}

function checkActivityState(game){
    const today = getTodayString();

    if(today < game.activity_start_date){
        return "not_started";
    }

    if(today >= game.activity_end_date){
        return "ended";
    }

    return "active";
}

async function loadWinners(){
    const winnerList=document.getElementById("winnerList");

    const {data,error}=await supabaseClient
        .from("winners")
        .select("*")
        .order("event_date",{ascending:true})
        .order("created_at",{ascending:true});

    if(error){
        winnerList.innerHTML=`<div class="empty-winner">中獎者讀取失敗</div>`;
        debug("讀取 winners 錯誤：" + error.message);
        return [];
    }

    if(!data || data.length===0){
        winnerList.innerHTML=`<div class="empty-winner">目前尚未有中獎者</div>`;
        return [];
    }

    winnerList.innerHTML = data.map((w,index) => {
        const dayText =
            index === 0 ? "🏆 第一天拆粽者" :
            index === 1 ? "🏆 第二天拆粽者" :
            index === 2 ? "🏆 第三天拆粽者" :
            `🏆 第${index+1}天拆粽者`;

        return `
            <div class="winner-item">
                <div class="winner-date">
                    ${dayText}
                </div>
                <div class="winner-name">
                    ${w.discord_name || w.discord_id}
                </div>
                <div class="winner-date" style="font-size:13px;margin-top:6px;opacity:.8;">
                    ${formatDate(w.event_date)}
                </div>
            </div>
        `;
    }).join("");

    return data;
}


async function loadRanking(){
    const rankingList=document.getElementById("rankingList");

    const {data,error}=await supabaseClient
        .from("players")
        .select("discord_id,discord_name,total_removed,total_opens,total_wins")
        .gt("total_removed",0)
        .order("total_removed",{ascending:false})
        .order("total_wins",{ascending:false})
        .order("total_opens",{ascending:true})
        .limit(10);

    if(error){
        rankingList.innerHTML=`<div class="empty-winner">排行榜讀取失敗</div>`;
        debug("讀取 players 排行榜錯誤：" + error.message);
        return [];
    }

    if(!data || data.length===0){
        rankingList.innerHTML=`<div class="empty-winner">目前尚無排行資料</div>`;
        return [];
    }

    rankingList.innerHTML = data.map((p,index) => {
        const medal =
            index === 0 ? "🥇" :
            index === 1 ? "🥈" :
            index === 2 ? "🥉" :
            `${index+1}.`;

        const name = p.discord_name || "Discord 玩家";
        const removed = p.total_removed || 0;
        const isMe = currentPlayer && p.discord_id === currentPlayer.discord_id;

        return `
            <div class="rank-item ${isMe ? "me" : ""}">
                <div class="rank-left">
                    <div class="rank-medal">${medal}</div>
                    <div class="rank-name" title="${name}">${name}${isMe ? `<span class="rank-me">(你)</span>` : ""}</div>
                </div>
                <div class="rank-score">${removed}片</div>
            </div>
        `;
    }).join("") + `<div class="rank-sub">每 30 秒自動更新，依累積拆除粽葉片數排序</div>`;

    return data;
}

async function resetGameForTodayIfNeeded(game){
    const today = getTodayString();

    if(activityState !== "active"){
        return game;
    }

    if(game.event_date === today){
        return game;
    }

    const newLeaves = getRandomLeaves();

    const {data,error}=await supabaseClient
        .from("game_state")
        .update({
            event_date: today,
            total_leaves: newLeaves,
            remaining_leaves: newLeaves,
            winner_discord_id: null
        })
        .eq("id", 1)
        .select()
        .single();

    if(error){
        debug("每日重置失敗：" + error.message);
        return game;
    }

    debug("每日重置完成");
    debug("新日期：" + today);
    debug("新粽葉：" + newLeaves);

    return data;
}

async function loadGameState(){
    const leavesBox=document.getElementById("remainingLeaves");
    const statusBox=document.getElementById("activityStatus");
    leavesBox.textContent="讀取中...";

    const {data,error}=await supabaseClient
        .from("game_state")
        .select("*")
        .eq("id",1)
        .single();

    if(error){
        leavesBox.textContent="讀取失敗";
        statusBox.textContent="";
        debug("game_state 讀取錯誤：" + error.message);
        return null;
    }

    activityState = checkActivityState(data);

    let game = data;

    if(activityState === "active"){
        game = await resetGameForTodayIfNeeded(data);
    }

    currentGameState = game;
    updateActivityDates(game);
    leavesBox.textContent = game.remaining_leaves;

    if(activityState === "not_started"){
        statusBox.textContent = `活動尚未開始，開始日期：${formatDate(game.activity_start_date)}`;
    }else if(activityState === "ended"){
        statusBox.textContent = `活動已結束，結束日期：${formatDate(game.activity_end_date)}`;
    }else{
        statusBox.textContent = `活動進行中：${formatDate(game.event_date)}`;
    }

    const {data:winner}=await supabaseClient
        .from("winners")
        .select("*")
        .eq("event_date",game.event_date)
        .maybeSingle();

    todayWinner = winner || null;

    return game;
}

function showEndedPage(game){
    if(cooldownTimer) clearInterval(cooldownTimer);

    document.getElementById("userBox").innerHTML=`
        <div class="end-title">🏆 端午拆粽子活動已結束</div>
        <div class="end-text">
            感謝各位參與本次活動<br>
            請查看左側中獎者列表與最終排行榜
        </div>
    `;

    const gameCard=document.getElementById("gameCard");
    if(gameCard) gameCard.style.display="none";
    document.getElementById("loginBtn").style.display="none";
    document.getElementById("logoutBtn").style.display="none";
}

async function loadPlayerStatus(user){
    const info=getDiscordInfo(user);

    const {data,error}=await supabaseClient.rpc("get_player_status_rpc",{
        p_discord_id: info.discordId,
        p_discord_name: info.name
    });

    if(error){
        debug("RPC get_player_status_rpc 錯誤：" + error.message);
        return null;
    }

    const result = data || {};

    if(!result.ok){
        debug("玩家狀態讀取失敗：" + (result.message || result.reason || "unknown"));
        return null;
    }

    currentPlayer = {
        discord_id: info.discordId,
        discord_name: info.name,
        total_removed: result.player_total_removed || 0,
        total_opens: result.player_total_opens || 0,
        total_wins: result.player_total_wins || 0,
        bonus_opens: result.bonus_opens || 0,
        bonus_available: !!result.bonus_available,
        cooldown: !!result.cooldown,
        remaining_seconds: Number(result.remaining_seconds || 0),
        next_time: result.next_time || null
    };

    cooldownSyncedAt = Date.now();
    return currentPlayer;
}

function updateCooldownUI(){
    const openBtn=document.getElementById("openBtn");
    const cooldownText=document.getElementById("cooldownText");

    if(activityState === "not_started"){
        openBtn.disabled=true;
        cooldownText.textContent="活動尚未開始";
        return;
    }

    if(activityState === "ended"){
        openBtn.disabled=true;
        cooldownText.textContent="活動已結束";
        return;
    }

    if(todayWinner || (currentGameState && currentGameState.remaining_leaves<=0)){
        openBtn.disabled=true;
        cooldownText.textContent = todayWinner
            ? `今日粽子已拆完，中獎者：${todayWinner.discord_name || todayWinner.discord_id}`
            : "今日粽子已經拆完";
        return;
    }

    if(!currentUser){
        openBtn.disabled=true;
        cooldownText.textContent="請先登入 Discord";
        return;
    }

    if(!currentPlayer){
        openBtn.disabled=true;
        cooldownText.textContent="玩家資料讀取中...";
        return;
    }

    if(Number(currentPlayer.bonus_opens || 0) > 0){
        openBtn.disabled=false;
        cooldownText.textContent="✨ 你有再拆一次機會";
        return;
    }

    const originalSeconds = Number(currentPlayer.remaining_seconds || 0);
    const elapsedSeconds = cooldownSyncedAt ? Math.floor((Date.now() - cooldownSyncedAt) / 1000) : 0;
    const remainSeconds = Math.max(0, originalSeconds - elapsedSeconds);

    if(remainSeconds > 0){
        openBtn.disabled=true;
        cooldownText.textContent="冷卻中，剩餘：" + formatTime(remainSeconds * 1000);
        return;
    }

    currentPlayer.cooldown = false;
    currentPlayer.remaining_seconds = 0;
    openBtn.disabled=false;
    cooldownText.textContent="目前可以拆粽子";
}

function startCooldownTimer(){
    if(cooldownTimer) clearInterval(cooldownTimer);
    updateCooldownUI();

    if(activityState === "ended"){
        return;
    }

    cooldownTimer=setInterval(updateCooldownUI,1000);
}


function playLeafBurst(count){
    const zongziBox = document.querySelector(".zongzi");
    const layer = document.getElementById("leafBurstLayer");
    if(!layer) return;

    const safeCount = Math.max(1, Math.min(6, Number(count || 1)));
    layer.innerHTML = "";

    if(zongziBox){
        zongziBox.classList.remove("hit");
        void zongziBox.offsetWidth;
        zongziBox.classList.add("hit");
    }

    for(let i=0;i<safeCount;i++){
        const leaf = document.createElement("span");
        leaf.className = "leaf-piece";

        const angle = (-120 + (240 / Math.max(1, safeCount - 1)) * i) + (Math.random() * 28 - 14);
        const distance = 72 + Math.random() * 58;
        const rad = angle * Math.PI / 180;
        const dx = Math.cos(rad) * distance;
        const dy = Math.sin(rad) * distance - 18;
        const rot = (Math.random() > .5 ? 1 : -1) * (90 + Math.random() * 180);

        leaf.style.setProperty("--dx", `${dx}px`);
        leaf.style.setProperty("--dy", `${dy}px`);
        leaf.style.setProperty("--rot", `${rot}deg`);
        leaf.style.animationDelay = `${i * 45}ms`;
        layer.appendChild(leaf);
    }

    setTimeout(()=>{
        layer.innerHTML = "";
        if(zongziBox) zongziBox.classList.remove("hit");
    }, 1300);
}

async function openZongzi(){
    const openBtn=document.getElementById("openBtn");
    const diceResult=document.getElementById("diceResult");
    const leavesBox=document.getElementById("remainingLeaves");
    const bonusBox=document.getElementById("bonusMessage");
    if(bonusBox){
        bonusBox.style.display="none";
        bonusBox.textContent="";
    }

    const nowClick = Date.now();
    if(isOpeningZongzi || nowClick - lastOpenClickAt < OPEN_CLICK_GUARD_MS){
        diceResult.textContent="操作太快，請稍等一下";
        return;
    }
    isOpeningZongzi = true;
    lastOpenClickAt = nowClick;

    try{
        if(!currentUser){
            diceResult.textContent="請先登入 Discord";
            return;
        }

        await loadGameState();
        await loadPlayerStatus(currentUser);
        updateCooldownUI();

        if(activityState === "not_started"){
            diceResult.textContent="活動尚未開始";
            return;
        }

        if(activityState === "ended"){
            diceResult.textContent="活動已結束";
            return;
        }

        if(todayWinner || (currentGameState && currentGameState.remaining_leaves<=0)){
            diceResult.textContent = todayWinner
                ? `今日已開獎，中獎者：${todayWinner.discord_name || todayWinner.discord_id}`
                : "今日粽子已經被拆完了";
            updateCooldownUI();
            return;
        }

        openBtn.disabled=true;
        diceResult.textContent="拆粽子中...";

        const info=getDiscordInfo(currentUser);

        const {data,error}=await supabaseClient.rpc("open_zongzi_rpc",{
            p_discord_id: info.discordId,
            p_discord_name: info.name
        });

        if(error){
            diceResult.textContent="拆粽子失敗，請稍後再試";
            debug("RPC open_zongzi_rpc 錯誤：" + error.message);
            await loadGameState();
            await loadRanking();
            updateCooldownUI();
            return;
        }

        const result = data || {};

        if(!result.ok){
            if(result.reason === "cooldown"){
                const seconds = Number(result.remaining_seconds || 0);
                if(currentPlayer){
                    currentPlayer.cooldown = seconds > 0;
                    currentPlayer.remaining_seconds = seconds;
                    currentPlayer.next_time = result.next_time || null;
                    cooldownSyncedAt = Date.now();
                }
                diceResult.textContent = seconds > 0
                    ? "冷卻中，剩餘：" + formatTime(seconds * 1000)
                    : (result.message || "冷卻中，還不能拆粽子");
            }else{
                diceResult.textContent = result.message || "目前不能拆粽子";
            }

            await loadGameState();
            await loadRanking();
            updateCooldownUI();
            return;
        }

        if(!currentPlayer){
            currentPlayer = {};
        }

        currentPlayer.discord_id = info.discordId;
        currentPlayer.discord_name = info.name;
        currentPlayer.total_removed = result.player_total_removed || 0;
        currentPlayer.total_opens = result.player_total_opens || 0;
        currentPlayer.total_wins = result.player_total_wins || 0;
        currentPlayer.bonus_opens = result.bonus_opens || 0;
        currentPlayer.bonus_available = Number(result.bonus_opens || 0) > 0;

        leavesBox.textContent = result.remaining_leaves;
        playLeafBurst(result.removed_leaves);

        if(result.bonus_granted && bonusBox){
            bonusBox.style.display="block";
            bonusBox.textContent="✨ 算你運氣好，再拆一次！";
        }

        diceResult.innerHTML = result.is_winner
            ? `🎉 恭喜你拆掉最後一片粽葉！<br>🏆 今日中獎者：${info.name}<br>🎲 骰出：${result.dice}<br>🍃 拆掉：${result.removed_leaves}<br>🍃 剩餘：0`
            : `🎲 骰出：${result.dice}<br>🍃 拆掉：${result.removed_leaves}<br>🍃 剩餘：${result.remaining_leaves}${result.bonus_granted ? `<br>✨ 算你運氣好，再拆一次！` : ``}`;

        await loadWinners();
        await loadRanking();
        await loadGameState();
        await loadPlayerStatus(currentUser);
        refreshUserBox();
        startCooldownTimer();
    }finally{
        isOpeningZongzi = false;
    }
}

function refreshUserBox(){
    if(!currentUser || !currentPlayer) return;
    const info=getDiscordInfo(currentUser);

    document.getElementById("userBox").innerHTML=`
        <h2>玩家</h2>
        ${info.avatar ? `<img class="avatar" src="${info.avatar}">` : ""}
        <p>已登入：${info.name}</p>
        <p>累積拆除：${currentPlayer.total_removed || 0} 片</p>
        <p>拆粽次數：${currentPlayer.total_opens || 0} 次</p>
        <p>中獎次數：${currentPlayer.total_wins || 0} 次</p>
        <p style="color:#d85b18;line-height:1.8;">✨ 再拆一次：${currentPlayer.bonus_opens || 0} 次</p>
    `;
}

async function loginWithDiscord(){
    document.getElementById("debugBox").textContent="開始 Discord 登入...";
    const {error}=await supabaseClient.auth.signInWithOAuth({
        provider:"discord",
        options:{redirectTo:window.location.origin}
    });
    if(error) debug("登入錯誤：" + error.message);
}

async function logout(){
    await supabaseClient.auth.signOut();
    localStorage.clear();
    location.href=window.location.origin;
}

async function checkUser(){
    document.getElementById("debugBox").textContent="目前網址：" + window.location.href;

    await loadWinners();
    const game = await loadGameState();

    if(activityState === "ended"){
        currentUser=null;
        currentPlayer=null;
        await loadRanking();
        showEndedPage(game);
        return;
    }

    const gameCard=document.getElementById("gameCard");
    if(gameCard) gameCard.style.display="block";

    const {data,error}=await supabaseClient.auth.getSession();
    if(error) debug("getSession 錯誤：" + error.message);

    const user=data?.session?.user;
    currentUser=user || null;

    const loginBtn=document.getElementById("loginBtn");
    const logoutBtn=document.getElementById("logoutBtn");
    const userBox=document.getElementById("userBox");

    if(!user){
        currentPlayer=null;
        await loadRanking();
        userBox.innerHTML=`<h2>玩家</h2><p>尚未登入 Discord</p>`;
        loginBtn.style.display="inline-block";
        logoutBtn.style.display="none";
        startCooldownTimer();
        return;
    }

    await loadPlayerStatus(user);
    await loadRanking();

    loginBtn.style.display="none";
    logoutBtn.style.display="inline-block";

    refreshUserBox();
    startCooldownTimer();
}

supabaseClient.auth.onAuthStateChange(() => {
    checkUser();
});

checkUser();

if(rankingTimer) clearInterval(rankingTimer);
rankingTimer = setInterval(loadRanking, 30000);
</script>

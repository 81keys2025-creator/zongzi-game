<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>拆粽子遊戲</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:"Microsoft JhengHei",sans-serif;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
    text-align:center;
}

h1{
    margin-top:0;
    color:#2d3436;
}

.zongzi{
    font-size:100px;
}

.card{
    background:#f8f9fa;
    border-radius:12px;
    padding:20px;
    margin-top:20px;
}

.cooldown{
    font-size:28px;
    color:#e17055;
    font-weight:bold;
}

.button{
    margin-top:20px;
    border:none;
    background:#00b894;
    color:white;
    padding:15px 40px;
    font-size:20px;
    border-radius:12px;
    cursor:pointer;
}

.button:hover{
    opacity:.9;
}

.note{
    color:#636e72;
    margin-top:15px;
}
</style>

</head>
<body>

<div class="container">

    <div class="zongzi">🍙</div>

    <h1>拆粽子遊戲</h1>

    <div class="card">
        <h2>玩家</h2>
        <div>尚未登入 Discord</div>
    </div>

    <div class="card">
        <h2>剩餘粽葉</h2>
        <div style="font-size:40px;font-weight:bold;">
            150
        </div>
    </div>

    <div class="card">
        <h2>下次可拆時間</h2>
        <div class="cooldown">
            03:00:00
        </div>
    </div>

    <button class="button">
        拆粽子
    </button>

    <div class="note">
        第一版介面測試中
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆粽子遊戲</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --green:#2f7d32;
    --green2:#43a047;
    --light-green:#e8f5e9;
    --brown:#8d5a2b;
    --orange:#d35400;
    --gold:#f6c85f;
    --paper:#fffdf4;
    --ink:#2d3436;
}
*{box-sizing:border-box;}
body{
    margin:0;
    min-height:100vh;
    font-family:"Microsoft JhengHei",sans-serif;
    color:var(--ink);
    background:
        radial-gradient(circle at 12% 12%, rgba(67,160,71,.18) 0 120px, transparent 121px),
        radial-gradient(circle at 88% 18%, rgba(246,200,95,.24) 0 150px, transparent 151px),
        linear-gradient(180deg,#fff8dc 0%,#f4e4a6 52%,#dff0c2 100%);
}
body:before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
        linear-gradient(45deg, rgba(47,125,50,.08) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(47,125,50,.06) 25%, transparent 25%);
    background-size:44px 44px;
    opacity:.45;
}
.layout{
    position:relative;
    max-width:1180px;
    margin:32px auto;
    display:grid;
    grid-template-columns:320px 1fr;
    gap:24px;
    padding:0 16px;
}
.container,.side{
    background:rgba(255,253,244,.94);
    border:2px solid rgba(141,90,43,.16);
    border-radius:26px;
    box-shadow:0 18px 40px rgba(98,68,24,.18);
    backdrop-filter:blur(6px);
}
.container{
    text-align:center;
    padding:34px;
    overflow:hidden;
    position:relative;
}
.container:before{
    content:"端午快樂";
    position:absolute;
    right:-28px;
    top:20px;
    transform:rotate(18deg);
    font-size:42px;
    font-weight:900;
    color:rgba(211,84,0,.08);
    letter-spacing:4px;
}
.side{
    padding:22px;
    align-self:start;
}
.zongzi{
    font-size:138px;
    line-height:1;
    filter:drop-shadow(0 14px 10px rgba(0,0,0,.18));
    animation:floatZongzi 3s ease-in-out infinite;
    margin-top:6px;
}
@keyframes floatZongzi{
    0%,100%{transform:translateY(0) rotate(-3deg);}
    50%{transform:translateY(-12px) rotate(3deg);}
}
h1,.main-title{
    margin:14px 0 22px;
    font-size:38px;
    line-height:1.25;
    color:#9b4d12;
    font-weight:900;
    text-shadow:0 3px 0 rgba(255,255,255,.75);
}
h2{margin:0 0 12px;color:#6d3f15;}
p{margin:8px 0;}
.card{
    background:linear-gradient(180deg,#ffffff 0%,#fff7dc 100%);
    border:1px solid rgba(141,90,43,.14);
    border-radius:20px;
    padding:22px;
    margin-top:18px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 8px 22px rgba(98,68,24,.08);
}
#gameCard{
    border:2px solid rgba(47,125,50,.18);
}
.button{
    margin-top:20px;
    border:none;
    background:linear-gradient(135deg,#32c766,#208a3a);
    color:white;
    padding:16px 46px;
    font-size:22px;
    font-weight:900;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 0 #14642b, 0 16px 28px rgba(32,138,58,.28);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
}
.button:hover:not(:disabled){
    transform:translateY(-3px) scale(1.03);
    filter:brightness(1.05);
    box-shadow:0 13px 0 #14642b, 0 20px 32px rgba(32,138,58,.32);
}
.button:active:not(:disabled){
    transform:translateY(5px);
    box-shadow:0 5px 0 #14642b, 0 10px 18px rgba(32,138,58,.22);
}
.button:disabled{
    background:linear-gradient(135deg,#c8d6d0,#95a5a6);
    cursor:not-allowed;
    box-shadow:0 8px 0 #7f8c8d, 0 14px 24px rgba(127,140,141,.18);
}
.logout{
    background:linear-gradient(135deg,#7f8c8d,#596566);
    box-shadow:0 10px 0 #424b4c, 0 16px 28px rgba(89,101,102,.24);
}
.avatar{
    width:84px;
    height:84px;
    border-radius:50%;
    margin-top:8px;
    border:4px solid #fff;
    box-shadow:0 8px 18px rgba(0,0,0,.18);
}
.debug{display:none;}
.leaves{
    display:inline-block;
    min-width:150px;
    font-size:76px;
    font-weight:900;
    color:#1f8f3a;
    margin:4px 0 12px;
    text-shadow:0 0 12px rgba(46,204,113,.45), 0 4px 0 rgba(255,255,255,.8);
}
.leaves:before{content:"🍃 ";font-size:42px;vertical-align:middle;}
.leaves:after{content:" 🍃";font-size:42px;vertical-align:middle;}
.dice-result{
    margin-top:22px;
    font-size:28px;
    line-height:1.55;
    font-weight:900;
    color:#d35400;
}
.cooldown{
    display:inline-block;
    margin-top:18px;
    padding:10px 16px;
    font-size:18px;
    color:#5f6b60;
    font-weight:900;
    background:#eef8e8;
    border-radius:999px;
    border:1px solid rgba(47,125,50,.16);
}
.status{
    display:inline-block;
    font-size:19px;
    font-weight:900;
    color:#d35400;
    margin:8px 0 12px;
    padding:8px 14px;
    background:#fff0d4;
    border-radius:999px;
}
.winner-title,.rank-title{
    font-size:23px;
    font-weight:900;
    color:#6d3f15;
    margin-bottom:14px;
}
.rank-title{
    margin-top:26px;
    padding-top:22px;
    border-top:2px dashed rgba(141,90,43,.25);
}
.winner-item{
    background:linear-gradient(180deg,#fff 0%,#fff3cf 100%);
    border:1px solid rgba(246,200,95,.65);
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:0 8px 18px rgba(98,68,24,.09);
}
.winner-date{
    font-weight:900;
    color:#7a4312;
    line-height:1.55;
}
.winner-name{
    color:#d35400;
    font-size:20px;
    font-weight:900;
    margin-top:8px;
    word-break:break-word;
}
.empty-winner{
    color:#8b8b8b;
    margin-top:8px;
    padding:14px;
    background:rgba(255,255,255,.62);
    border-radius:14px;
}
.rank-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fffdf4;
    border:1px solid rgba(141,90,43,.12);
    border-radius:16px;
    padding:12px 13px;
    margin-bottom:10px;
    box-shadow:0 6px 14px rgba(98,68,24,.06);
}
.rank-item:nth-child(1){background:linear-gradient(135deg,#fff7c2,#ffd76a);border-color:#f1c40f;}
.rank-item:nth-child(2){background:linear-gradient(135deg,#ffffff,#dfe6e9);border-color:#b2bec3;}
.rank-item:nth-child(3){background:linear-gradient(135deg,#ffe2c2,#d99b5f);border-color:#cd7f32;}
.rank-item.me{
    outline:3px solid rgba(211,84,0,.28);
}
.rank-left{
    display:flex;
    align-items:center;
    gap:9px;
    min-width:0;
}
.rank-medal{font-size:22px;flex:0 0 auto;}
.rank-name{
    font-weight:900;
    color:#2d3436;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.rank-score{
    color:#d35400;
    font-weight:900;
    flex:0 0 auto;
    margin-left:8px;
}
.rank-me{font-size:12px;color:#d35400;margin-left:4px;}
.rank-sub{font-size:12px;color:#8b8b8b;margin-top:10px;line-height:1.5;}
.end-title{font-size:34px;font-weight:900;color:#d35400;margin-top:10px;}
.end-text{font-size:20px;color:#636e72;line-height:1.8;}
@media(max-width:900px){
    .layout{grid-template-columns:1fr;margin:18px auto;padding:0 14px;}
    .side{order:2;}
    .container{order:1;padding:24px 18px;}
    .zongzi{font-size:112px;}
    h1,.main-title{font-size:30px;}
    .leaves{font-size:58px;}
    .leaves:before,.leaves:after{font-size:30px;}
    .button{width:100%;padding:15px 18px;}
}
</style>
</head>

<body>
<div class="layout">
    <div class="side">
        <div class="winner-title">🏆 中獎者列表</div>
        <div id="winnerList">讀取中...</div>

        <div class="rank-title">📊 拆粽排行榜 TOP10</div>
        <div id="rankingList">讀取中...</div>
    </div>

    <div class="container">
        <div class="zongzi">🍙</div>
        <h1 class="main-title">🎋 2026端午拆粽大作戰 🎋</h1>

        <div class="card" id="userBox">載入中...</div>

        <div class="card" id="gameCard">
            <h2>今日粽子</h2>
            <div class="status" id="activityStatus"></div>

            <p>剩餘粽葉</p>
            <div class="leaves" id="remainingLeaves">讀取中...</div>

            <button class="button" id="openBtn" onclick="openZongzi()">拆粽子</button>

            <div class="cooldown" id="cooldownText"></div>
            <div class="dice-result" id="diceResult"></div>
        </div>

        <button class="button" id="loginBtn" onclick="loginWithDiscord()">使用 Discord 登入</button>
        <button class="button logout" id="logoutBtn" onclick="logout()" style="display:none;">登出</button>

        <div class="debug" id="debugBox">debug...</div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://ibupsejdhvagpozqorpl.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ybz32jxKJ0DiJ6oUJvsXHA_tcEr80QH";

const MIN_LEAVES = 100;
const MAX_LEAVES = 200;

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}
});

let currentGameState = null;
let currentUser = null;
let currentPlayer = null;
let cooldownTimer = null;
let todayWinner = null;
let activityState = "loading";
let cooldownSyncedAt = 0;
let rankingTimer = null;
let isOpeningZongzi = false;
let lastOpenClickAt = 0;
const OPEN_CLICK_GUARD_MS = 3000;

function debug(msg){
    document.getElementById("debugBox").textContent += "\n" + msg;
}

function getTodayString(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
}

function getRandomLeaves(){
    return Math.floor(Math.random() * (MAX_LEAVES - MIN_LEAVES + 1)) + MIN_LEAVES;
}

function formatTime(ms){
    const s=Math.max(0,Math.floor(ms/1000));
    return `${Math.floor(s/3600)}小時 ${Math.floor((s%3600)/60)}分 ${s%60}秒`;
}

function formatDate(dateText){
    const d = new Date(dateText + "T00:00:00");
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}

function getDiscordInfo(user){
    const meta=user.user_metadata||{};
    return {
        name: meta.full_name || meta.name || meta.preferred_username || "Discord 玩家",
        avatar: meta.avatar_url || meta.picture || "",
        discordId: meta.provider_id || meta.sub || user.id
    };
}

function checkActivityState(game){
    const today = getTodayString();

    if(today < game.activity_start_date){
        return "not_started";
    }

    if(today >= game.activity_end_date){
        return "ended";
    }

    return "active";
}

async function loadWinners(){
    const winnerList=document.getElementById("winnerList");

    const {data,error}=await supabaseClient
        .from("winners")
        .select("*")
        .order("event_date",{ascending:true})
        .order("created_at",{ascending:true});

    if(error){
        winnerList.innerHTML=`<div class="empty-winner">中獎者讀取失敗</div>`;
        debug("讀取 winners 錯誤：" + error.message);
        return [];
    }

    if(!data || data.length===0){
        winnerList.innerHTML=`<div class="empty-winner">目前尚未有中獎者</div>`;
        return [];
    }

    winnerList.innerHTML = data.map((w,index) => {
        const dayText =
            index === 0 ? "🏆 第一天拆粽者" :
            index === 1 ? "🏆 第二天拆粽者" :
            index === 2 ? "🏆 第三天拆粽者" :
            `🏆 第${index+1}天拆粽者`;

        return `
            <div class="winner-item">
                <div class="winner-date">
                    ${dayText}
                </div>
                <div class="winner-name">
                    ${w.discord_name || w.discord_id}
                </div>
                <div class="winner-date" style="font-size:13px;margin-top:6px;opacity:.8;">
                    ${formatDate(w.event_date)}
                </div>
            </div>
        `;
    }).join("");

    return data;
}


async function loadRanking(){
    const rankingList=document.getElementById("rankingList");

    const {data,error}=await supabaseClient
        .from("players")
        .select("discord_id,discord_name,total_removed,total_opens,total_wins")
        .gt("total_removed",0)
        .order("total_removed",{ascending:false})
        .order("total_wins",{ascending:false})
        .order("total_opens",{ascending:true})
        .limit(10);

    if(error){
        rankingList.innerHTML=`<div class="empty-winner">排行榜讀取失敗</div>`;
        debug("讀取 players 排行榜錯誤：" + error.message);
        return [];
    }

    if(!data || data.length===0){
        rankingList.innerHTML=`<div class="empty-winner">目前尚無排行資料</div>`;
        return [];
    }

    rankingList.innerHTML = data.map((p,index) => {
        const medal =
            index === 0 ? "🥇" :
            index === 1 ? "🥈" :
            index === 2 ? "🥉" :
            `${index+1}.`;

        const rankText =
            index === 0 ? "第一名" :
            index === 1 ? "第二名" :
            index === 2 ? "第三名" :
            `第${index+1}名`;

        const name = p.discord_name || "Discord 玩家";
        const removed = p.total_removed || 0;
        const isMe = currentPlayer && p.discord_id === currentPlayer.discord_id;

        return `
            <div class="rank-item ${isMe ? "me" : ""}">
                <div class="rank-left">
                    <div class="rank-medal">${medal}</div>
                    <div class="rank-name" title="${name}">${rankText} ${name}${isMe ? `<span class="rank-me">(你)</span>` : ""}</div>
                </div>
                <div class="rank-score">${removed}片</div>
            </div>
        `;
    }).join("") + `<div class="rank-sub">每 30 秒自動更新，依累積拆除粽葉片數排序</div>`;

    return data;
}

async function resetGameForTodayIfNeeded(game){
    const today = getTodayString();

    if(activityState !== "active"){
        return game;
    }

    if(game.event_date === today){
        return game;
    }

    const newLeaves = getRandomLeaves();

    const {data,error}=await supabaseClient
        .from("game_state")
        .update({
            event_date: today,
            total_leaves: newLeaves,
            remaining_leaves: newLeaves,
            winner_discord_id: null
        })
        .eq("id", 1)
        .select()
        .single();

    if(error){
        debug("每日重置失敗：" + error.message);
        return game;
    }

    debug("每日重置完成");
    debug("新日期：" + today);
    debug("新粽葉：" + newLeaves);

    return data;
}

async function loadGameState(){
    const leavesBox=document.getElementById("remainingLeaves");
    const statusBox=document.getElementById("activityStatus");
    leavesBox.textContent="讀取中...";

    const {data,error}=await supabaseClient
        .from("game_state")
        .select("*")
        .eq("id",1)
        .single();

    if(error){
        leavesBox.textContent="讀取失敗";
        statusBox.textContent="";
        debug("game_state 讀取錯誤：" + error.message);
        return null;
    }

    activityState = checkActivityState(data);

    let game = data;

    if(activityState === "active"){
        game = await resetGameForTodayIfNeeded(data);
    }

    currentGameState = game;
    leavesBox.textContent = game.remaining_leaves;

    if(activityState === "not_started"){
        statusBox.textContent = `活動尚未開始，開始日期：${formatDate(game.activity_start_date)}`;
    }else if(activityState === "ended"){
        statusBox.textContent = `活動已結束，結束日期：${formatDate(game.activity_end_date)}`;
    }else{
        statusBox.textContent = `活動進行中：${formatDate(game.event_date)}`;
    }

    const {data:winner}=await supabaseClient
        .from("winners")
        .select("*")
        .eq("event_date",game.event_date)
        .maybeSingle();

    todayWinner = winner || null;

    return game;
}

function showEndedPage(game){
    if(cooldownTimer) clearInterval(cooldownTimer);

    document.getElementById("userBox").innerHTML=`
        <div class="end-title">🏆 端午拆粽子活動已結束</div>
        <div class="end-text">
            感謝各位參與本次活動<br>
            請查看左側中獎者列表與最終排行榜
        </div>
    `;

    const gameCard=document.getElementById("gameCard");
    if(gameCard) gameCard.style.display="none";
    document.getElementById("loginBtn").style.display="none";
    document.getElementById("logoutBtn").style.display="none";
}

async function loadPlayerStatus(user){
    const info=getDiscordInfo(user);

    const {data,error}=await supabaseClient.rpc("get_player_status_rpc",{
        p_discord_id: info.discordId,
        p_discord_name: info.name
    });

    if(error){
        debug("RPC get_player_status_rpc 錯誤：" + error.message);
        return null;
    }

    const result = data || {};

    if(!result.ok){
        debug("玩家狀態讀取失敗：" + (result.message || result.reason || "unknown"));
        return null;
    }

    currentPlayer = {
        discord_id: info.discordId,
        discord_name: info.name,
        total_removed: result.player_total_removed || 0,
        total_opens: result.player_total_opens || 0,
        total_wins: result.player_total_wins || 0,
        cooldown: !!result.cooldown,
        remaining_seconds: Number(result.remaining_seconds || 0),
        next_time: result.next_time || null
    };

    cooldownSyncedAt = Date.now();
    return currentPlayer;
}

function updateCooldownUI(){
    const openBtn=document.getElementById("openBtn");
    const cooldownText=document.getElementById("cooldownText");

    if(activityState === "not_started"){
        openBtn.disabled=true;
        cooldownText.textContent="活動尚未開始";
        return;
    }

    if(activityState === "ended"){
        openBtn.disabled=true;
        cooldownText.textContent="活動已結束";
        return;
    }

    if(todayWinner || (currentGameState && currentGameState.remaining_leaves<=0)){
        openBtn.disabled=true;
        cooldownText.textContent = todayWinner
            ? `今日粽子已拆完，中獎者：${todayWinner.discord_name || todayWinner.discord_id}`
            : "今日粽子已經拆完";
        return;
    }

    if(!currentUser){
        openBtn.disabled=true;
        cooldownText.textContent="請先登入 Discord";
        return;
    }

    if(!currentPlayer){
        openBtn.disabled=true;
        cooldownText.textContent="玩家資料讀取中...";
        return;
    }

    const originalSeconds = Number(currentPlayer.remaining_seconds || 0);
    const elapsedSeconds = cooldownSyncedAt ? Math.floor((Date.now() - cooldownSyncedAt) / 1000) : 0;
    const remainSeconds = Math.max(0, originalSeconds - elapsedSeconds);

    if(remainSeconds > 0){
        openBtn.disabled=true;
        cooldownText.textContent="冷卻中，剩餘：" + formatTime(remainSeconds * 1000);
        return;
    }

    currentPlayer.cooldown = false;
    currentPlayer.remaining_seconds = 0;
    openBtn.disabled=false;
    cooldownText.textContent="目前可以拆粽子";
}

function startCooldownTimer(){
    if(cooldownTimer) clearInterval(cooldownTimer);
    updateCooldownUI();

    if(activityState === "ended"){
        return;
    }

    cooldownTimer=setInterval(updateCooldownUI,1000);
}

async function openZongzi(){
    const openBtn=document.getElementById("openBtn");
    const diceResult=document.getElementById("diceResult");
    const leavesBox=document.getElementById("remainingLeaves");

    const nowClick = Date.now();
    if(isOpeningZongzi || nowClick - lastOpenClickAt < OPEN_CLICK_GUARD_MS){
        diceResult.textContent="操作太快，請稍等一下";
        return;
    }
    isOpeningZongzi = true;
    lastOpenClickAt = nowClick;

    try{
        if(!currentUser){
            diceResult.textContent="請先登入 Discord";
            return;
        }

        await loadGameState();
        await loadPlayerStatus(currentUser);
        updateCooldownUI();

        if(activityState === "not_started"){
            diceResult.textContent="活動尚未開始";
            return;
        }

        if(activityState === "ended"){
            diceResult.textContent="活動已結束";
            return;
        }

        if(todayWinner || (currentGameState && currentGameState.remaining_leaves<=0)){
            diceResult.textContent = todayWinner
                ? `今日已開獎，中獎者：${todayWinner.discord_name || todayWinner.discord_id}`
                : "今日粽子已經被拆完了";
            updateCooldownUI();
            return;
        }

        openBtn.disabled=true;
        diceResult.textContent="拆粽子中...";

        const info=getDiscordInfo(currentUser);

        const {data,error}=await supabaseClient.rpc("open_zongzi_rpc",{
            p_discord_id: info.discordId,
            p_discord_name: info.name
        });

        if(error){
            diceResult.textContent="拆粽子失敗，請稍後再試";
            debug("RPC open_zongzi_rpc 錯誤：" + error.message);
            await loadGameState();
            await loadRanking();
            updateCooldownUI();
            return;
        }

        const result = data || {};

        if(!result.ok){
            if(result.reason === "cooldown"){
                const seconds = Number(result.remaining_seconds || 0);
                if(currentPlayer){
                    currentPlayer.cooldown = seconds > 0;
                    currentPlayer.remaining_seconds = seconds;
                    currentPlayer.next_time = result.next_time || null;
                    cooldownSyncedAt = Date.now();
                }
                diceResult.textContent = seconds > 0
                    ? "冷卻中，剩餘：" + formatTime(seconds * 1000)
                    : (result.message || "冷卻中，還不能拆粽子");
            }else{
                diceResult.textContent = result.message || "目前不能拆粽子";
            }

            await loadGameState();
            await loadRanking();
            updateCooldownUI();
            return;
        }

        if(!currentPlayer){
            currentPlayer = {};
        }

        currentPlayer.discord_id = info.discordId;
        currentPlayer.discord_name = info.name;
        currentPlayer.total_removed = result.player_total_removed || 0;
        currentPlayer.total_opens = result.player_total_opens || 0;
        currentPlayer.total_wins = result.player_total_wins || 0;

        leavesBox.textContent = result.remaining_leaves;

        diceResult.innerHTML = result.is_winner
            ? `🎉 恭喜你拆掉最後一片粽葉！<br>🏆 今日中獎者：${info.name}<br>🎲 骰出：${result.dice}<br>🍃 拆掉：${result.removed_leaves}<br>🍃 剩餘：0`
            : `🎲 骰出：${result.dice}<br>🍃 拆掉：${result.removed_leaves}<br>🍃 剩餘：${result.remaining_leaves}`;

        await loadWinners();
        await loadRanking();
        await loadGameState();
        await loadPlayerStatus(currentUser);
        refreshUserBox();
        startCooldownTimer();
    }finally{
        isOpeningZongzi = false;
    }
}

function refreshUserBox(){
    if(!currentUser || !currentPlayer) return;
    const info=getDiscordInfo(currentUser);

    document.getElementById("userBox").innerHTML=`
        <h2>玩家</h2>
        ${info.avatar ? `<img class="avatar" src="${info.avatar}">` : ""}
        <p>已登入：${info.name}</p>
        <p>累積拆除：${currentPlayer.total_removed || 0} 片</p>
        <p>拆粽次數：${currentPlayer.total_opens || 0} 次</p>
        <p>中獎次數：${currentPlayer.total_wins || 0} 次</p>
    `;
}

async function loginWithDiscord(){
    document.getElementById("debugBox").textContent="開始 Discord 登入...";
    const {error}=await supabaseClient.auth.signInWithOAuth({
        provider:"discord",
        options:{redirectTo:window.location.origin}
    });
    if(error) debug("登入錯誤：" + error.message);
}

async function logout(){
    await supabaseClient.auth.signOut();
    localStorage.clear();
    location.href=window.location.origin;
}

async function checkUser(){
    document.getElementById("debugBox").textContent="目前網址：" + window.location.href;

    await loadWinners();
    const game = await loadGameState();

    if(activityState === "ended"){
        currentUser=null;
        currentPlayer=null;
        await loadRanking();
        showEndedPage(game);
        return;
    }

    const gameCard=document.getElementById("gameCard");
    if(gameCard) gameCard.style.display="block";

    const {data,error}=await supabaseClient.auth.getSession();
    if(error) debug("getSession 錯誤：" + error.message);

    const user=data?.session?.user;
    currentUser=user || null;

    const loginBtn=document.getElementById("loginBtn");
    const logoutBtn=document.getElementById("logoutBtn");
    const userBox=document.getElementById("userBox");

    if(!user){
        currentPlayer=null;
        await loadRanking();
        userBox.innerHTML=`<h2>玩家</h2><p>尚未登入 Discord</p>`;
        loginBtn.style.display="inline-block";
        logoutBtn.style.display="none";
        startCooldownTimer();
        return;
    }

    await loadPlayerStatus(user);
    await loadRanking();

    loginBtn.style.display="none";
    logoutBtn.style.display="inline-block";

    refreshUserBox();
    startCooldownTimer();
}

supabaseClient.auth.onAuthStateChange(() => {
    checkUser();
});

checkUser();

if(rankingTimer) clearInterval(rankingTimer);
rankingTimer = setInterval(loadRanking, 30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆粽子遊戲</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:"Microsoft JhengHei",sans-serif;
}
.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
    text-align:center;
}
.zongzi{font-size:100px;}
.card{
    background:#f8f9fa;
    border-radius:12px;
    padding:20px;
    margin-top:20px;
}
.button{
    margin-top:20px;
    border:none;
    background:#5865F2;
    color:white;
    padding:15px 40px;
    font-size:20px;
    border-radius:12px;
    cursor:pointer;
}
.logout{background:#636e72;}
.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    margin-top:10px;
}
</style>
</head>

<body>
<div class="container">
    <div class="zongzi">🍙</div>
    <h1>拆粽子遊戲</h1>

    <div class="card" id="userBox">
        載入中...
    </div>

    <button class="button" id="loginBtn" onclick="loginWithDiscord()">使用 Discord 登入</button>
    <button class="button logout" id="logoutBtn" onclick="logout()" style="display:none;">登出</button>
</div>

<script>
const SUPABASE_URL = "https://ibupsejdhvagpozqorpl.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ybz32jxKJ0DiJ6oUJvsXHA_tcEr80QH";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loginWithDiscord(){
    await supabaseClient.auth.signInWithOAuth({
        provider: "discord",
        options: {
            redirectTo: "https://zongzi-game.pages.dev"
        }
    });
}

async function logout(){
    await supabaseClient.auth.signOut();
    location.reload();
}

async function checkUser(){
    const { data } = await supabaseClient.auth.getUser();
    const user = data.user;

    const userBox = document.getElementById("userBox");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    if(!user){
        userBox.innerHTML = `
            <h2>玩家</h2>
            <p>尚未登入 Discord</p>
        `;
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        return;
    }

    const name = user.user_metadata.full_name || user.user_metadata.name || "Discord 玩家";
    const avatar = user.user_metadata.avatar_url || "";

    userBox.innerHTML = `
        <h2>玩家</h2>
        ${avatar ? `<img class="avatar" src="${avatar}">` : ""}
        <p>已登入：${name}</p>
        <p style="font-size:12px;color:#636e72;">Discord ID：${user.user_metadata.provider_id || "取得中"}</p>
    `;

    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
}

checkUser();
</script>

</body>
</html>

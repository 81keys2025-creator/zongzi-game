<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆粽子遊戲</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#f5f5f5;font-family:"Microsoft JhengHei",sans-serif;}
.layout{max-width:1100px;margin:40px auto;display:grid;grid-template-columns:280px 1fr;gap:20px;}
.container,.side{background:white;border-radius:16px;padding:30px;box-shadow:0 0 15px rgba(0,0,0,.1);}
.container{text-align:center;}
.side{padding:20px;}
.zongzi{font-size:100px;}
.card{background:#f8f9fa;border-radius:12px;padding:20px;margin-top:20px;}
.button{margin-top:20px;border:none;background:#5865F2;color:white;padding:15px 40px;font-size:20px;border-radius:12px;cursor:pointer;}
.button:disabled{background:#b2bec3;cursor:not-allowed;}
.logout{background:#636e72;}
.avatar{width:80px;height:80px;border-radius:50%;margin-top:10px;}
.debug{margin-top:20px;text-align:left;font-size:12px;background:#222;color:#0f0;padding:15px;border-radius:10px;white-space:pre-wrap;}
.leaves{font-size:48px;font-weight:bold;color:#2d3436;margin:10px 0;}
.dice-result{margin-top:20px;font-size:28px;font-weight:bold;color:#e17055;}
.cooldown{margin-top:15px;font-size:18px;color:#636e72;font-weight:bold;}
.status{font-size:22px;font-weight:bold;color:#d35400;margin-top:10px;}
.winner-title{font-size:24px;font-weight:bold;margin-bottom:15px;}
.winner-item{background:#f8f9fa;border-radius:10px;padding:12px;margin-bottom:10px;}
.winner-date{font-weight:bold;color:#2d3436;}
.winner-name{color:#d35400;font-size:18px;margin-top:5px;}
.empty-winner{color:#999;margin-top:5px;}
@media(max-width:900px){.layout{grid-template-columns:1fr;margin:20px;}}
</style>
</head>

<body>
<div class="layout">
    <div class="side">
        <div class="winner-title">🏆 中獎者列表</div>
        <div id="winnerList">讀取中...</div>
    </div>

    <div class="container">
        <div class="zongzi">🍙</div>
        <h1>拆粽子遊戲</h1>

        <div class="card" id="userBox">載入中...</div>

        <div class="card">
            <h2>今日粽子</h2>
            <div class="status" id="activityStatus"></div>

            <p>剩餘粽葉</p>
            <div class="leaves" id="remainingLeaves">讀取中...</div>

            <button class="button" id="openBtn" onclick="openZongzi()">拆粽子</button>

            <div class="cooldown" id="cooldownText"></div>
            <div class="dice-result" id="diceResult"></div>
        </div>

        <button class="button" id="loginBtn" onclick="loginWithDiscord()">使用 Discord 登入</button>
        <button class="button logout" id="logoutBtn" onclick="logout()" style="display:none;">登出</button>

        <div class="debug" id="debugBox">debug...</div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://ibupsejdhvagpozqorpl.supabase.co";
const SUPABASE_KEY = "sb_publishable_Ybz32jxKJ0DiJ6oUJvsXHA_tcEr80QH";

const COOLDOWN_HOURS = 3;
const MIN_LEAVES = 100;
const MAX_LEAVES = 200;

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}
});

let currentGameState = null;
let currentUser = null;
let currentPlayer = null;
let cooldownTimer = null;
let todayWinner = null;
let activityState = "loading";

function debug(msg){
    document.getElementById("debugBox").textContent += "\n" + msg;
}

function getTodayString(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
}

function getRandomLeaves(){
    return Math.floor(Math.random() * (MAX_LEAVES - MIN_LEAVES + 1)) + MIN_LEAVES;
}

function formatTime(ms){
    const s=Math.max(0,Math.floor(ms/1000));
    return `${Math.floor(s/3600)}小時 ${Math.floor((s%3600)/60)}分 ${s%60}秒`;
}

function formatDate(dateText){
    const d = new Date(dateText + "T00:00:00");
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}

function getDiscordInfo(user){
    const meta=user.user_metadata||{};
    return {
        name: meta.full_name || meta.name || meta.preferred_username || "Discord 玩家",
        avatar: meta.avatar_url || meta.picture || "",
        discordId: meta.provider_id || meta.sub || user.id
    };
}

function checkActivityState(game){
    const today = getTodayString();

    if(today < game.activity_start_date){
        return "not_started";
    }

    if(today >= game.activity_end_date){
        return "ended";
    }

    return "active";
}

async function loadWinners(){
    const winnerList=document.getElementById("winnerList");

    const {data,error}=await supabaseClient
        .from("winners")
        .select("*")
        .order("event_date",{ascending:true})
        .order("created_at",{ascending:true});

    if(error){
        winnerList.innerHTML=`<div class="empty-winner">中獎者讀取失敗</div>`;
        debug("讀取 winners 錯誤：" + error.message);
        return [];
    }

    if(!data || data.length===0){
        winnerList.innerHTML=`<div class="empty-winner">目前尚未有中獎者</div>`;
        return [];
    }

    winnerList.innerHTML = data.map(w => `
        <div class="winner-item">
            <div class="winner-date">${formatDate(w.event_date)}</div>
            <div class="winner-name">${w.discord_name || w.discord_id}</div>
            <div class="empty-winner">骰出 ${w.dice || "-"}，拆掉 ${w.removed_leaves || "-"} 片</div>
        </div>
    `).join("");

    return data;
}

async function resetGameForTodayIfNeeded(game){
    const today = getTodayString();

    if(activityState !== "active"){
        return game;
    }

    if(game.event_date === today){
        return game;
    }

    const newLeaves = getRandomLeaves();

    const {data,error}=await supabaseClient
        .from("game_state")
        .update({
            event_date: today,
            total_leaves: newLeaves,
            remaining_leaves: newLeaves,
            winner_discord_id: null
        })
        .eq("id", 1)
        .select()
        .single();

    if(error){
        debug("每日重置失敗：" + error.message);
        return game;
    }

    debug("每日重置完成");
    debug("新日期：" + today);
    debug("新粽葉：" + newLeaves);

    return data;
}

async function loadGameState(){
    const leavesBox=document.getElementById("remainingLeaves");
    const statusBox=document.getElementById("activityStatus");
    leavesBox.textContent="讀取中...";

    const {data,error}=await supabaseClient
        .from("game_state")
        .select("*")
        .eq("id",1)
        .single();

    if(error){
        leavesBox.textContent="讀取失敗";
        statusBox.textContent="";
        debug("game_state 讀取錯誤：" + error.message);
        return null;
    }

    activityState = checkActivityState(data);

    let game = data;

    if(activityState === "active"){
        game = await resetGameForTodayIfNeeded(data);
    }

    currentGameState = game;
    leavesBox.textContent = game.remaining_leaves;

    if(activityState === "not_started"){
        statusBox.textContent = `活動尚未開始，開始日期：${formatDate(game.activity_start_date)}`;
    }else if(activityState === "ended"){
        statusBox.textContent = `活動已結束，結束日期：${formatDate(game.activity_end_date)}`;
    }else{
        statusBox.textContent = `活動進行中：${formatDate(game.event_date)}`;
    }

    const {data:winner}=await supabaseClient
        .from("winners")
        .select("*")
        .eq("event_date",game.event_date)
        .maybeSingle();

    todayWinner = winner || null;

    return game;
}

async function loadOrCreatePlayer(user){
    const info=getDiscordInfo(user);

    const {data:players,error}=await supabaseClient
        .from("players")
        .select("*")
        .eq("discord_id",info.discordId)
        .order("id",{ascending:true})
        .limit(1);

    if(error){
        debug("讀取玩家錯誤：" + error.message);
        return null;
    }

    let player=players && players.length>0 ? players[0] : null;

    if(!player){
        const {data:newPlayer,error:insertError}=await supabaseClient
            .from("players")
            .insert({
                discord_id:info.discordId,
                discord_name:info.name,
                last_open_time:null,
                total_removed:0,
                total_opens:0,
                total_wins:0
            })
            .select()
            .single();

        if(insertError){
            debug("建立玩家錯誤：" + insertError.message);
            return null;
        }

        player=newPlayer;
    }else{
        const {data:updatedPlayer}=await supabaseClient
            .from("players")
            .update({discord_name:info.name})
            .eq("id",player.id)
            .select()
            .single();

        if(updatedPlayer) player=updatedPlayer;
    }

    currentPlayer=player;
    return player;
}

function updateCooldownUI(){
    const openBtn=document.getElementById("openBtn");
    const cooldownText=document.getElementById("cooldownText");

    if(activityState === "not_started"){
        openBtn.disabled=true;
        cooldownText.textContent="活動尚未開始";
        return;
    }

    if(activityState === "ended"){
        openBtn.disabled=true;
        cooldownText.textContent="活動已結束";
        return;
    }

    if(todayWinner || (currentGameState && currentGameState.remaining_leaves<=0)){
        openBtn.disabled=true;
        cooldownText.textContent = todayWinner
            ? `今日粽子已拆完，中獎者：${todayWinner.discord_name || todayWinner.discord_id}`
            : "今日粽子已經拆完";
        return;
    }

    if(!currentUser){
        openBtn.disabled=true;
        cooldownText.textContent="請先登入 Discord";
        return;
    }

    if(!currentPlayer){
        openBtn.disabled=true;
        cooldownText.textContent="玩家資料讀取中...";
        return;
    }

    if(!currentPlayer.last_open_time){
        openBtn.disabled=false;
        cooldownText.textContent="目前可以拆粽子";
        return;
    }

    const last=new Date(currentPlayer.last_open_time).getTime();
    const remain=last + COOLDOWN_HOURS*60*60*1000 - Date.now();

    if(remain<=0){
        openBtn.disabled=false;
        cooldownText.textContent="目前可以拆粽子";
    }else{
        openBtn.disabled=true;
        cooldownText.textContent="冷卻中，剩餘：" + formatTime(remain);
    }
}

function startCooldownTimer(){
    if(cooldownTimer) clearInterval(cooldownTimer);
    updateCooldownUI();
    cooldownTimer=setInterval(updateCooldownUI,1000);
}

async function openZongzi(){
    const openBtn=document.getElementById("openBtn");
    const diceResult=document.getElementById("diceResult");
    const leavesBox=document.getElementById("remainingLeaves");

    if(!currentUser || !currentPlayer){
        diceResult.textContent="請先登入，或等待玩家資料讀取完成";
        return;
    }

    await loadGameState();
    updateCooldownUI();

    if(activityState === "not_started"){
        diceResult.textContent="活動尚未開始";
        return;
    }

    if(activityState === "ended"){
        diceResult.textContent="活動已結束";
        return;
    }

    if(openBtn.disabled){
        diceResult.textContent="目前不能拆粽子";
        return;
    }

    openBtn.disabled=true;
    diceResult.textContent="拆粽子中...";

    const game=await loadGameState();

    if(!game || todayWinner || game.remaining_leaves<=0){
        diceResult.textContent = todayWinner
            ? `今日已開獎，中獎者：${todayWinner.discord_name || todayWinner.discord_id}`
            : "今日粽子已經被拆完了";
        updateCooldownUI();
        return;
    }

    const info=getDiscordInfo(currentUser);
    const dice=Math.floor(Math.random()*6)+1;
    const actualRemoved=Math.min(dice,game.remaining_leaves);
    const newRemaining=Math.max(0,game.remaining_leaves-dice);
    const isWinner = newRemaining === 0;
    const nowIso=new Date().toISOString();

    let updatedGame=null;

    if(isWinner){
        const {data:winGame,error:winGameError}=await supabaseClient
            .from("game_state")
            .update({
                remaining_leaves:0,
                winner_discord_id:info.discordId
            })
            .eq("id",1)
            .is("winner_discord_id",null)
            .select()
            .maybeSingle();

        if(winGameError || !winGame){
            await loadGameState();
            await loadWinners();
            diceResult.textContent="剛剛已經有人搶先拆完粽子了";
            updateCooldownUI();
            return;
        }

        const {error:winnerError}=await supabaseClient
            .from("winners")
            .insert({
                event_date:winGame.event_date,
                discord_id:info.discordId,
                discord_name:info.name,
                removed_leaves:actualRemoved,
                dice:dice
            });

        if(winnerError){
            await loadGameState();
            await loadWinners();
            diceResult.textContent="剛剛已經有人搶先中獎了";
            updateCooldownUI();
            return;
        }

        updatedGame=winGame;
    }else{
        const {data:normalGame,error:normalError}=await supabaseClient
            .from("game_state")
            .update({remaining_leaves:newRemaining})
            .eq("id",1)
            .is("winner_discord_id",null)
            .select()
            .single();

        if(normalError){
            diceResult.textContent="扣除失敗，請重試";
            debug("更新 game_state 錯誤：" + normalError.message);
            updateCooldownUI();
            return;
        }

        updatedGame=normalGame;
    }

    const {data:updatedPlayer,error:playerError}=await supabaseClient
        .from("players")
        .update({
            last_open_time:nowIso,
            total_removed:(currentPlayer.total_removed||0)+actualRemoved,
            total_opens:(currentPlayer.total_opens||0)+1,
            total_wins:(currentPlayer.total_wins||0)+(isWinner?1:0)
        })
        .eq("id",currentPlayer.id)
        .select()
        .single();

    if(playerError){
        diceResult.textContent="玩家資料更新失敗";
        debug("更新 players 錯誤：" + playerError.message);
        updateCooldownUI();
        return;
    }

    currentGameState=updatedGame;
    currentPlayer=updatedPlayer;
    leavesBox.textContent=updatedGame.remaining_leaves;

    diceResult.innerHTML = isWinner
        ? `🎉 恭喜你拆掉最後一片粽葉！<br>🏆 今日中獎者：${info.name}<br>🎲 骰出：${dice}<br>🍃 拆掉：${actualRemoved}<br>🍃 剩餘：0`
        : `🎲 骰出：${dice}<br>🍃 拆掉：${actualRemoved}<br>🍃 剩餘：${updatedGame.remaining_leaves}`;

    await loadWinners();
    await loadGameState();
    refreshUserBox();
    startCooldownTimer();
}

function refreshUserBox(){
    if(!currentUser || !currentPlayer) return;
    const info=getDiscordInfo(currentUser);

    document.getElementById("userBox").innerHTML=`
        <h2>玩家</h2>
        ${info.avatar ? `<img class="avatar" src="${info.avatar}">` : ""}
        <p>已登入：${info.name}</p>
        <p style="font-size:12px;color:#636e72;">Discord ID：${info.discordId}</p>
        <p>累積拆除：${currentPlayer.total_removed || 0} 片</p>
        <p>拆粽次數：${currentPlayer.total_opens || 0} 次</p>
        <p>中獎次數：${currentPlayer.total_wins || 0} 次</p>
    `;
}

async function loginWithDiscord(){
    document.getElementById("debugBox").textContent="開始 Discord 登入...";
    const {error}=await supabaseClient.auth.signInWithOAuth({
        provider:"discord",
        options:{redirectTo:window.location.origin}
    });
    if(error) debug("登入錯誤：" + error.message);
}

async function logout(){
    await supabaseClient.auth.signOut();
    localStorage.clear();
    location.href=window.location.origin;
}

async function checkUser(){
    document.getElementById("debugBox").textContent="目前網址：" + window.location.href;

    await loadWinners();
    await loadGameState();

    const {data,error}=await supabaseClient.auth.getSession();
    if(error) debug("getSession 錯誤：" + error.message);

    const user=data?.session?.user;
    currentUser=user || null;

    const loginBtn=document.getElementById("loginBtn");
    const logoutBtn=document.getElementById("logoutBtn");
    const userBox=document.getElementById("userBox");

    if(!user){
        currentPlayer=null;
        userBox.innerHTML=`<h2>玩家</h2><p>尚未登入 Discord</p>`;
        loginBtn.style.display="inline-block";
        logoutBtn.style.display="none";
        startCooldownTimer();
        return;
    }

    await loadOrCreatePlayer(user);

    loginBtn.style.display="none";
    logoutBtn.style.display="inline-block";

    refreshUserBox();
    startCooldownTimer();
}

supabaseClient.auth.onAuthStateChange(() => {
    checkUser();
});

checkUser();
</script>
</body>
</html>
